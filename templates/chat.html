{% extends "base.html" %}
{% block content %}
<div class="chat-layout-centered">

  <div class="chat-main">
    <div class="chat-messages" id="chat-messages">
      <div class="chat-welcome">
        <div class="welcome-icon">🤖</div>
        <div class="welcome-title">AI Assistant Pertamina</div>
        <div class="welcome-desc">Tanya tentang dokumen, data equipment, monitoring, atau analisa kondisi aset.</div>
        <div class="welcome-chips">
          <button class="wchip" onclick="setSuggestion(this.textContent)">Berapa equipment bad actor aktif?</button>
          <button class="wchip" onclick="setSuggestion(this.textContent)">Equipment mana yang paling banyak WO overdue?</button>
          <button class="wchip" onclick="setSuggestion(this.textContent)">List zero clamp yang masih terpasang</button>
          <button class="wchip" onclick="setSuggestion(this.textContent)">Ringkasan kondisi ICU critical bulan ini</button>
          <button class="wchip" onclick="setSuggestion(this.textContent)">SOP penanganan vibrasi tinggi</button>
          <button class="wchip" onclick="setSuggestion(this.textContent)">Prosedur overhaul pompa sentrifugal</button>
        </div>
      </div>
    </div>

    <div class="chat-input-area">
      <div class="chat-input-wrap">
        <textarea id="chat-input" placeholder="Ketik pertanyaan... (Enter untuk kirim, Shift+Enter untuk baris baru)"
                  rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="chat-send-btn" id="send-btn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
      <div class="chat-input-meta">
        <span id="intent-indicator" class="intent-badge hidden"></span>
        <span style="font-size:11px;color:var(--text3);margin-left:auto">Powered by GPT-4o · Data Governance Pertamina</span>
      </div>
    </div>
  </div>

</div>
{% endblock %}

{% block scripts %}
<style>
/* Assistant message open layout */
.bubble-assistant { padding: 2px 0 8px; }
.bubble-assistant .bubble-sources,
.bubble-assistant .bubble-sql,
.bubble-assistant .bubble-rewritten { margin-top: 10px; }

/* Loading dots */
.loading-bubble { display: flex; align-items: center; gap: 10px; padding: 8px 0; }
.loading-bubble .status-dot {
  width: 8px; height: 8px; border-radius: 50%; background: #6366f1; flex-shrink: 0;
  animation: pulse-dot 1.2s ease-in-out infinite;
}
.loading-bubble .status-label { font-size: 12.5px; color: #475569; font-style: italic; }
@keyframes pulse-dot {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.75); }
}
</style>

<script>
let history = [];
let isLoading = false;
let loadingId = null;
const SESSION_ID = crypto.randomUUID();

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 160) + 'px';
}

function setSuggestion(text) {
  const input = document.getElementById('chat-input');
  input.value = text; autoResize(input); input.focus();
}

function showLoading(label) {
  const container = document.getElementById('chat-messages');
  const id = 'loading-' + Date.now();
  const div = document.createElement('div');
  div.id = id;
  div.className = 'chat-bubble bubble-assistant';
  div.innerHTML = `<div class="loading-bubble">
    <div class="status-dot"></div>
    <span class="status-label" id="${id}-label">${escapeHtml(label)}</span>
  </div>`;
  container.appendChild(div);
  scrollToBottom();
  return id;
}

function removeLoading(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}

async function sendMessage() {
  const input = document.getElementById('chat-input');
  const message = input.value.trim();
  if (!message || isLoading) return;

  isLoading = true;
  input.value = '';
  input.style.height = 'auto';
  document.getElementById('send-btn').disabled = true;

  appendBubble('user', message);
  loadingId = showLoading('Memproses pertanyaan...');

  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), 135000);

  try {
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message, history, filters: {}, session_id: SESSION_ID}),
      signal: controller.signal
    });

    removeLoading(loadingId);

    if (!response.ok) throw new Error('Server error ' + response.status);

    const data = await response.json();
    appendAssistantBubble(data);

    history.push({role: 'user', content: message});
    history.push({role: 'assistant', content: data.answer || ''});
    if (history.length > 20) history = history.slice(-20);
    showIntent(data.intent);

  } catch (err) {
    removeLoading(loadingId);
    const msg = err.name === 'AbortError'
      ? 'Permintaan timeout — server terlalu lama merespons. Coba lagi atau sederhanakan pertanyaan.'
      : 'Gagal terhubung ke server. Pastikan server berjalan dan coba refresh halaman.';
    appendBubble('assistant', msg);
  } finally {
    clearTimeout(timer);
    isLoading = false;
    loadingId = null;
    document.getElementById('send-btn').disabled = false;
    input.focus();
  }
}

function appendBubble(role, content) {
  const container = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = `chat-bubble bubble-${role}`;
  div.innerHTML = `<div class="bubble-content">${escapeHtml(content).replace(/\n/g, '<br>')}</div>`;
  container.appendChild(div);
  scrollToBottom();
}

function appendAssistantBubble(data) {
  const container = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = 'chat-bubble bubble-assistant';

  let html = `<div class="bubble-content">${formatAnswer(data.answer || '')}</div>`;

  if (data.rewritten && data.rewritten !== data.message) {
    html += `<div class="bubble-rewritten">
      <span class="rewritten-label">🔄 Dipahami sebagai:</span>
      <span class="rewritten-text">${escapeHtml(data.rewritten)}</span>
    </div>`;
  }

  if (data.sources && data.sources.length > 0) {
    html += `<div class="bubble-sources">
      <div class="sources-title">📄 Sumber Dokumen</div>
      ${data.sources.map(s => `
        <a href="/document/${s.doc_id}" class="source-item" target="_blank">
          <span class="source-name">${escapeHtml(s.judul)}</span>
          ${s.ru ? `<span class="source-badge">${s.ru}</span>` : ''}
          ${s.halaman ? `<span class="source-badge">Hal. ${s.halaman}</span>` : ''}
          <span class="source-score">${Math.round(s.score*100)}%</span>
        </a>
      `).join('')}
    </div>`;
  }

  if (data.sql) {
    html += `<details class="bubble-sql">
      <summary>🗄️ SQL Query ${data.total_rows ? `(${data.total_rows} hasil)` : ''}</summary>
      <pre class="sql-code">${escapeHtml(data.sql)}</pre>
    </details>`;
  }

  if (data.cypher) {
    html += `<details class="bubble-sql">
      <summary>🔗 Cypher Query</summary>
      <pre class="sql-code">${escapeHtml(data.cypher)}</pre>
    </details>`;
  }

  div.innerHTML = html;
  container.appendChild(div);
  scrollToBottom();
}

function showIntent(intent) {
  const badge = document.getElementById('intent-indicator');
  const labels = {rag:'📄 RAG Dokumen', sql:'🗄️ Query Database', graph:'🔗 Knowledge Graph', hybrid:'⚡ Hybrid', general:'💬 General'};
  badge.textContent = labels[intent] || intent;
  badge.className = `intent-badge intent-${intent}`;
  setTimeout(() => badge.classList.add('hidden'), 5000);
}

function formatAnswer(text) {
  return escapeHtml(text)
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/^- (.+)$/gm, '• $1')
    .replace(/\n/g, '<br>');
}

function escapeHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function scrollToBottom() {
  const c = document.getElementById('chat-messages');
  c.scrollTop = c.scrollHeight;
}

document.getElementById('chat-input').focus();
</script>
{% endblock %}
