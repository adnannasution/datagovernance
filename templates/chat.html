{% extends "base.html" %}

{% block content %}
<div class="chat-page">

  <!-- Messages area -->
  <div class="chat-messages" id="chat-messages">
    <div class="chat-welcome">
      <div class="welcome-icon">🤖</div>
      <div class="welcome-title">AI Assistant Pertamina</div>
      <div class="welcome-desc">Tanya tentang dokumen, data equipment, monitoring, atau analisa kondisi aset.</div>
      <div class="welcome-chips">
        <button class="wchip" onclick="setSuggestion(this.textContent)">Berapa equipment bad actor aktif?</button>
        <button class="wchip" onclick="setSuggestion(this.textContent)">Equipment mana yang paling banyak WO overdue?</button>
        <button class="wchip" onclick="setSuggestion(this.textContent)">List zero clamp yang masih terpasang</button>
        <button class="wchip" onclick="setSuggestion(this.textContent)">Ringkasan kondisi ICU critical bulan ini</button>
        <button class="wchip" onclick="setSuggestion(this.textContent)">SOP penanganan vibrasi tinggi</button>
        <button class="wchip" onclick="setSuggestion(this.textContent)">Prosedur overhaul pompa sentrifugal</button>
      </div>
    </div>
  </div>

  <!-- Input bar -->
  <div class="chat-inputbar">
    <div class="chat-inputbar-inner">
      <div class="chat-input-wrap">
        <textarea id="chat-input" placeholder="Ketik pertanyaan..." rows="1"
                  onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="chat-send-btn" id="send-btn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
      <div class="chat-input-meta">
        <span id="intent-indicator" class="intent-badge hidden"></span>
        <span style="font-size:11px;color:var(--text3);margin-left:auto">Powered by GPT-4o · Data Governance Pertamina</span>
      </div>
    </div>
  </div>

</div>
{% endblock %}

{% block head_extra %}
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
{% endblock %}

{% block scripts %}
<style>
/* Override content padding for chat page */
.content { padding: 0 !important; overflow: hidden; }

.chat-page {
  display: flex;
  flex-direction: column;
  height: calc(100vh - 56px);
  max-width: 780px;
  margin: 0 auto;
  width: 100%;
  position: relative;
}

/* Messages */
.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 2rem 1.25rem 140px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  scrollbar-width: none;
}
.chat-messages::-webkit-scrollbar { display: none; }

/* Welcome */
.chat-welcome {
  text-align: center;
  padding: 3rem 1rem 1.5rem;
  color: var(--text2);
}
.welcome-icon { font-size: 44px; margin-bottom: 12px; }
.welcome-title { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
.welcome-desc { font-size: 13.5px; line-height: 1.6; color: var(--text2); margin-bottom: 1.5rem; }
.welcome-chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
.wchip {
  background: #fff; border: 1px solid #e2e8f0; border-radius: 20px;
  padding: 7px 14px; font-size: 12.5px; color: #475569;
  cursor: pointer; font-family: inherit;
  transition: background 0.15s, border-color 0.15s, color 0.15s;
  box-shadow: 0 1px 2px rgba(0,0,0,0.04);
}
.wchip:hover { background: #eef2ff; border-color: #c7d2fe; color: #4f46e5; }

/* Bubbles */
.msg-user {
  display: flex;
  justify-content: flex-end;
}
.msg-user .msg-bubble {
  background: #2563eb;
  color: #fff;
  border-radius: 18px 18px 4px 18px;
  padding: 10px 15px;
  font-size: 13.5px;
  line-height: 1.6;
  max-width: 75%;
  word-break: break-word;
}

.msg-assistant {
  display: flex;
  flex-direction: column;
  gap: 8px;
  max-width: 100%;
}
.msg-assistant .msg-text {
  font-size: 14px;
  line-height: 1.85;
  color: var(--text);
}
.msg-assistant .msg-text strong { font-weight: 600; }

/* Status indicator */
.msg-status {
  display: flex;
  align-items: center;
  gap: 8px;
}
.msg-status .sdot {
  width: 7px; height: 7px; border-radius: 50%; background: #6366f1;
  animation: sdot-pulse 1.2s ease-in-out infinite; flex-shrink: 0;
}
@keyframes sdot-pulse {
  0%,100% { opacity:1; transform:scale(1); }
  50% { opacity:0.4; transform:scale(0.75); }
}
.msg-status .slabel { font-size: 12.5px; color: #64748b; font-style: italic; }

/* Sources & SQL */
.msg-sources { margin-top: 4px; }
.sources-title { font-size: 11px; font-weight: 600; color: var(--text3); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .04em; }
.source-item { display:flex; align-items:center; gap:6px; padding:6px 8px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); margin-bottom:4px; text-decoration:none; font-size:12px; color:var(--text2); transition:border-color 0.15s,color 0.15s; }
.source-item:hover { border-color:var(--primary); color:var(--primary); }
.source-name { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.source-badge { font-size:10px; padding:1px 6px; background:var(--surface2); border-radius:3px; white-space:nowrap; flex-shrink:0; }
.source-score { font-size:10px; color:var(--success); font-weight:500; flex-shrink:0; }
.msg-sql { margin-top: 4px; }
.msg-sql summary { font-size:12px; color:var(--text3); cursor:pointer; padding:4px 0; }
.msg-sql summary:hover { color:var(--text2); }
.sql-code { font-size:11px; font-family:monospace; background:var(--surface2); padding:8px 10px; border-radius:var(--radius); margin-top:6px; white-space:pre-wrap; color:var(--text2); border:1px solid var(--border); }
.msg-rewritten { font-size:11px; color:var(--text3); font-style:italic; display:flex; gap:6px; align-items:flex-start; flex-wrap:wrap; margin-top: 4px; }
.rewritten-label { color:var(--accent); font-style:normal; font-weight:500; white-space:nowrap; }

/* Result table & chart */
.msg-result { margin-top: 4px; }
.result-toggle { display:inline-flex; gap:2px; background:var(--surface2); border-radius:8px; padding:2px; margin-bottom:8px; }
.result-toggle button { border:none; background:transparent; cursor:pointer; font-size:11.5px; font-weight:500; padding:5px 12px; border-radius:6px; color:var(--text2); font-family:inherit; transition:background 0.15s, color 0.15s; }
.result-toggle button.active { background:#fff; color:var(--primary); box-shadow:0 1px 2px rgba(0,0,0,0.08); }
.result-table-wrap { overflow-x:auto; max-height:360px; overflow-y:auto; border:1px solid var(--border); border-radius:var(--radius); width:100%; }
.result-table { width:100%; border-collapse:collapse; min-width:max-content; }
.result-table th { text-align:left; padding:8px 12px; background:var(--surface2); font-size:10.5px; font-weight:600; text-transform:uppercase; letter-spacing:.04em; color:var(--text3); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:1; white-space:nowrap; }
.result-table td { padding:8px 12px; border-bottom:1px solid var(--border); font-size:12.5px; color:var(--text); white-space:nowrap; max-width:240px; overflow:hidden; text-overflow:ellipsis; }
.result-table tr:last-child td { border-bottom:none; }
.result-table tbody tr:nth-child(even) td { background:var(--surface2); }
.result-row-note { font-size:11px; color:var(--text3); margin-top:6px; }
.result-chart-wrap { position:relative; width:100%; height:280px; max-height:280px; border:1px solid var(--border); border-radius:var(--radius); padding:10px; box-sizing:border-box; }
.result-chart-wrap canvas { max-width:100%; max-height:100%; }

/* Input bar — fixed at bottom */
.chat-inputbar {
  position: fixed;
  bottom: 0;
  left: var(--sidebar-w);
  right: 0;
  padding: 0 1.25rem 20px;
  background: transparent;
  z-index: 50;
}
.chat-inputbar-inner {
  max-width: 780px;
  margin: 0 auto;
  background: #fff;
  border-radius: 16px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.12), 0 1px 4px rgba(0,0,0,0.06);
  padding: 8px 8px 8px 14px;
  border: 1px solid #e2e8f0;
}
.chat-input-wrap { display: flex; gap: 6px; align-items: flex-end; }
#chat-input {
  flex: 1; padding: 6px 4px;
  border: none; outline: none;
  font-size: 13.5px; resize: none; line-height: 1.5;
  max-height: 160px; font-family: inherit;
  background: transparent; color: var(--text);
}
.chat-send-btn {
  width: 38px; height: 38px; border-radius: 50%;
  background: var(--primary); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  transition: background 0.15s, transform 0.1s;
}
.chat-send-btn svg { width: 15px; height: 15px; stroke: #fff; fill: none; stroke-width: 2; }
.chat-send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.chat-send-btn:hover:not(:disabled) { background: var(--primary-dark); transform: scale(1.05); }
.chat-input-meta { display: flex; align-items: center; margin-top: 4px; min-height: 18px; padding: 0 4px; }
</style>

<script>
let history = [];
let isLoading = false;
let statusTimer = null;
const SESSION_ID = crypto.randomUUID();
let chartInstances = {};
let resultDataStore = {};

const FAKE_STEPS = [
  '✏️ Memahami pertanyaan...',
  '🧭 Menentukan sumber data...',
  '🔍 Mencari informasi relevan...',
  '⚡ Memproses data...',
  '📊 Menyusun jawaban...',
];

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 160) + 'px';
}
function setSuggestion(text) {
  const input = document.getElementById('chat-input');
  input.value = text; autoResize(input); input.focus();
}

function showStatus() {
  const container = document.getElementById('chat-messages');
  const id = 'status-' + Date.now();
  const div = document.createElement('div');
  div.id = id;
  div.className = 'msg-status';
  div.innerHTML = `<div class="sdot"></div><span class="slabel" id="${id}-lbl">${FAKE_STEPS[0]}</span>`;
  container.appendChild(div);
  scrollToBottom();
  let step = 1;
  statusTimer = setInterval(() => {
    const el = document.getElementById(id + '-lbl');
    if (el) { el.textContent = FAKE_STEPS[step % FAKE_STEPS.length]; step++; }
  }, 2500);
  return id;
}

function removeStatus(id) {
  if (statusTimer) { clearInterval(statusTimer); statusTimer = null; }
  const el = document.getElementById(id);
  if (el) el.remove();
}

async function sendMessage() {
  const input = document.getElementById('chat-input');
  const message = input.value.trim();
  if (!message || isLoading) return;

  isLoading = true;
  input.value = '';
  input.style.height = 'auto';
  document.getElementById('send-btn').disabled = true;

  // Hide welcome screen on first message
  const welcome = document.querySelector('.chat-welcome');
  if (welcome) welcome.style.display = 'none';

  appendUser(message);
  const statusId = showStatus();

  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), 135000);

  try {
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message, history, filters: {}, session_id: SESSION_ID}),
      signal: controller.signal
    });

    removeStatus(statusId);
    if (!response.ok) throw new Error('Server error ' + response.status);

    const data = await response.json();
    appendAssistant(data);
    history.push({role: 'user', content: message});
    history.push({role: 'assistant', content: data.answer || ''});
    if (history.length > 20) history = history.slice(-20);
    showIntent(data.intent);

  } catch (err) {
    removeStatus(statusId);
    appendAssistant({answer: err.name === 'AbortError'
      ? 'Permintaan timeout. Coba lagi atau sederhanakan pertanyaan.'
      : 'Gagal terhubung ke server.'});
  } finally {
    clearTimeout(timer);
    isLoading = false;
    document.getElementById('send-btn').disabled = false;
    input.focus();
  }
}

function appendUser(text) {
  const c = document.getElementById('chat-messages');
  const d = document.createElement('div');
  d.className = 'msg-user';
  d.innerHTML = `<div class="msg-bubble">${escapeHtml(text).replace(/\n/g,'<br>')}</div>`;
  c.appendChild(d); scrollToBottom();
}

function getResultRows(data) {
  const rows = data.data || data.sql_data || [];
  return Array.isArray(rows) ? rows : [];
}

function isNumericValue(v) {
  if (v === null || v === undefined || v === '') return false;
  if (typeof v === 'number') return Number.isFinite(v);
  if (typeof v !== 'string') return false;
  return /^-?\d+(\.\d+)?$/.test(v.trim());
}

function analyzeColumns(rows) {
  const cols = Object.keys(rows[0] || {});
  const numericCols = [];
  const labelCols = [];
  cols.forEach(col => {
    const samples = rows.map(r => r[col]).filter(v => v !== null && v !== undefined && v !== '');
    const isNumeric = samples.length > 0 && samples.every(isNumericValue);
    if (isNumeric) numericCols.push(col); else labelCols.push(col);
  });
  return { cols, numericCols, labelCols };
}

function getChartSpec(rows) {
  if (!rows || rows.length < 1) return null;
  const { numericCols, labelCols } = analyzeColumns(rows);
  if (numericCols.length === 0 || labelCols.length === 0) return null;
  return { labelCol: labelCols[0], valueCol: numericCols[0] };
}

function renderResultTable(rows, totalRows) {
  if (!rows || rows.length === 0) return '';
  const cols = Object.keys(rows[0]);
  const thead = `<tr>${cols.map(c => `<th>${escapeHtml(c)}</th>`).join('')}</tr>`;
  const tbody = rows.map(row => {
    const tds = cols.map(c => {
      const v = row[c];
      const display = (v === null || v === undefined) ? '—' : String(v);
      const esc = escapeHtml(display);
      return `<td title="${esc}">${esc}</td>`;
    }).join('');
    return `<tr>${tds}</tr>`;
  }).join('');
  let note = '';
  if (totalRows && totalRows > rows.length) {
    note = `<div class="result-row-note">Menampilkan ${rows.length} dari ${totalRows} hasil</div>`;
  }
  return `
    <div class="result-table-wrap">
      <table class="result-table"><thead>${thead}</thead><tbody>${tbody}</tbody></table>
    </div>
    ${note}`;
}

function renderResultBlock(rows, totalRows, msgId) {
  if (!rows || rows.length === 0) return '';
  const tableHtml = renderResultTable(rows, totalRows);
  const chartSpec = getChartSpec(rows);

  if (!chartSpec) {
    return `<div class="msg-result" id="result-${msgId}">${tableHtml}</div>`;
  }

  resultDataStore[msgId] = { rows, chartSpec };

  return `
    <div class="msg-result" id="result-${msgId}">
      <div class="result-toggle">
        <button class="active" data-view="table" onclick="switchResultView('${msgId}','table')">📋 Tabel</button>
        <button data-view="chart" onclick="switchResultView('${msgId}','chart')">📊 Chart</button>
      </div>
      <div class="result-table-slot">${tableHtml}</div>
      <div class="result-chart-slot" style="display:none">
        <div class="result-chart-wrap"><canvas id="chart-${msgId}"></canvas></div>
      </div>
    </div>`;
}

function switchResultView(msgId, view) {
  const root = document.getElementById('result-' + msgId);
  if (!root) return;
  root.querySelectorAll('.result-toggle button').forEach(b => {
    b.classList.toggle('active', b.dataset.view === view);
  });
  root.querySelector('.result-table-slot').style.display = view === 'table' ? '' : 'none';
  root.querySelector('.result-chart-slot').style.display = view === 'chart' ? '' : 'none';

  if (view === 'chart' && !chartInstances[msgId]) {
    buildChart(msgId);
  }
}

function buildChart(msgId) {
  const entry = resultDataStore[msgId];
  if (!entry) return;
  const { rows, chartSpec } = entry;
  const canvas = document.getElementById('chart-' + msgId);
  if (!canvas) return;

  const labels = rows.map(r => String(r[chartSpec.labelCol] ?? ''));
  const values = rows.map(r => {
    const v = r[chartSpec.valueCol];
    return typeof v === 'number' ? v : parseFloat(v) || 0;
  });

  const ctx = canvas.getContext('2d');
  chartInstances[msgId] = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: chartSpec.valueCol,
        data: values,
        backgroundColor: '#6366f1'
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: { y: { beginAtZero: true } }
    }
  });
}

function appendAssistant(data) {
  const c = document.getElementById('chat-messages');
  const d = document.createElement('div');
  d.className = 'msg-assistant';
  const msgId = 'msg-' + Date.now() + '-' + Math.floor(Math.random() * 1000);

  let html = `<div class="msg-text">${formatAnswer(data.answer || '')}</div>`;

  if (data.rewritten && data.rewritten !== data.message) {
    html += `<div class="msg-rewritten">
      <span class="rewritten-label">🔄 Dipahami sebagai:</span>
      <span>${escapeHtml(data.rewritten)}</span>
    </div>`;
  }
  if (data.sources && data.sources.length > 0) {
    html += `<div class="msg-sources">
      <div class="sources-title">📄 Sumber Dokumen</div>
      ${data.sources.map(s => `
        <a href="/document/${s.doc_id}" class="source-item" target="_blank">
          <span class="source-name">${escapeHtml(s.judul)}</span>
          ${s.ru ? `<span class="source-badge">${s.ru}</span>` : ''}
          ${s.halaman ? `<span class="source-badge">Hal. ${s.halaman}</span>` : ''}
          <span class="source-score">${Math.round(s.score*100)}%</span>
        </a>`).join('')}
    </div>`;
  }

  const resultRows = getResultRows(data);
  if (resultRows.length > 0) {
    html += renderResultBlock(resultRows, data.total_rows, msgId);
  }

  if (data.sql) {
    html += `<details class="msg-sql">
      <summary>🗄️ SQL Query ${data.total_rows ? `(${data.total_rows} hasil)` : ''}</summary>
      <pre class="sql-code">${escapeHtml(data.sql)}</pre>
    </details>`;
  }
  if (data.cypher) {
    html += `<details class="msg-sql">
      <summary>🔗 Cypher Query</summary>
      <pre class="sql-code">${escapeHtml(data.cypher)}</pre>
    </details>`;
  }

  d.innerHTML = html;
  c.appendChild(d); scrollToBottom();
}

function showIntent(intent) {
  const badge = document.getElementById('intent-indicator');
  const labels = {rag:'📄 RAG Dokumen', sql:'🗄️ Query Database', graph:'🔗 Knowledge Graph', hybrid:'⚡ Hybrid', general:'💬 General'};
  badge.textContent = labels[intent] || intent;
  badge.className = `intent-badge intent-${intent}`;
  setTimeout(() => badge.classList.add('hidden'), 5000);
}

function formatAnswer(text) {
  return escapeHtml(text)
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/^- (.+)$/gm, '• $1')
    .replace(/\n/g, '<br>');
}

function escapeHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function scrollToBottom() {
  const c = document.getElementById('chat-messages');
  c.scrollTop = c.scrollHeight;
}

document.getElementById('chat-input').focus();
</script>
{% endblock %}
