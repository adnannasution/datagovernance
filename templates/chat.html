{% extends "base.html" %}
{% block content %}
<div class="chat-layout-centered">

  <div class="chat-main">
    <div class="chat-messages" id="chat-messages">
      <div class="chat-welcome">
        <div class="welcome-icon">🤖</div>
        <div class="welcome-title">AI Assistant Pertamina</div>
        <div class="welcome-desc">Tanya tentang dokumen, data equipment, monitoring, atau analisa kondisi aset.</div>
        <div class="welcome-chips">
          <button class="wchip" onclick="setSuggestion(this.textContent)">Berapa equipment bad actor aktif?</button>
          <button class="wchip" onclick="setSuggestion(this.textContent)">Equipment mana yang paling banyak WO overdue?</button>
          <button class="wchip" onclick="setSuggestion(this.textContent)">List zero clamp yang masih terpasang</button>
          <button class="wchip" onclick="setSuggestion(this.textContent)">Ringkasan kondisi ICU critical bulan ini</button>
          <button class="wchip" onclick="setSuggestion(this.textContent)">SOP penanganan vibrasi tinggi</button>
          <button class="wchip" onclick="setSuggestion(this.textContent)">Prosedur overhaul pompa sentrifugal</button>
        </div>
      </div>
    </div>

    <div class="chat-input-area">
      <div class="chat-input-wrap">
        <textarea id="chat-input" placeholder="Ketik pertanyaan... (Enter untuk kirim, Shift+Enter untuk baris baru)"
                  rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="chat-send-btn" id="send-btn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
      <div class="chat-input-meta">
        <span id="intent-indicator" class="intent-badge hidden"></span>
        <span style="font-size:11px;color:var(--text3);margin-left:auto">Powered by GPT-4o · Data Governance Pertamina</span>
      </div>
    </div>
  </div>

</div>
{% endblock %}

{% block scripts %}
<style>
/* Streaming cursor */
.stream-cursor {
  display: inline-block;
  color: #6366f1;
  animation: blink-cursor 0.8s step-end infinite;
  font-size: 14px;
  margin-left: 1px;
  vertical-align: middle;
}
@keyframes blink-cursor { 0%,100%{opacity:1} 50%{opacity:0} }

/* Assistant message open layout */
.bubble-assistant { padding: 2px 0 8px; }
.bubble-assistant .bubble-sources,
.bubble-assistant .bubble-sql,
.bubble-assistant .bubble-rewritten { margin-top: 10px; }

/* Status bubble */
.status-bubble {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  background: #f8fafc;
  border: 1px solid #e2e8f0;
  border-radius: 12px;
  margin: 4px 0;
  max-width: 420px;
}
.status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #6366f1;
  flex-shrink: 0;
  animation: pulse-dot 1.2s ease-in-out infinite;
}
@keyframes pulse-dot {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.75); }
}
.status-label {
  font-size: 12.5px;
  color: #475569;
  font-style: italic;
}
.status-step-tag {
  font-size: 10px;
  font-weight: 600;
  color: #6366f1;
  background: #eef2ff;
  border-radius: 4px;
  padding: 1px 5px;
  margin-left: 4px;
}
</style>

<script>
let history = [];
let isLoading = false;
let streamBubbleEl = null;
let streamContentEl = null;
let streamAccumText = '';
const SESSION_ID = crypto.randomUUID();

const STEP_ICONS = {
  rewrite: '✏️', intent: '🧭', intent_result: '🎯',
  embed: '🔢', search: '🔍', generate: '✍️',
  gen_sql: '🛠️', exec_sql: '⚡', retry_sql: '🔄', format_sql: '📊',
  graph_tag: '🔗', gen_cypher: '🛠️', exec_cypher: '⚡', retry_cypher: '🔄',
  format_graph: '📊', synthesize: '🧩'
};

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 160) + 'px';
}

function setSuggestion(text) {
  const input = document.getElementById('chat-input');
  input.value = text; autoResize(input); input.focus();
}

// ─── Status bubble helpers ───────────────────────────────────────────────────
function showStatusBubble(label, step) {
  const container = document.getElementById('chat-messages');
  const id = 'status-' + Date.now();
  const div = document.createElement('div');
  div.id = id;
  div.className = 'chat-bubble bubble-assistant';
  div.innerHTML = `<div class="status-bubble">
    <div class="status-dot"></div>
    <span class="status-label" id="${id}-label">${escapeHtml(label)}</span>
  </div>`;
  container.appendChild(div);
  scrollToBottom();
  return id;
}

function updateStatusBubble(id, label, step) {
  const el = document.getElementById(id + '-label');
  if (el) {
    const icon = STEP_ICONS[step] || '';
    el.textContent = (icon ? icon + ' ' : '') + label;
  }
  scrollToBottom();
}

function removeStatusBubble(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}

function startStreamBubble(statusId) {
  removeStatusBubble(statusId);
  streamAccumText = '';
  const container = document.getElementById('chat-messages');
  streamBubbleEl = document.createElement('div');
  streamBubbleEl.className = 'chat-bubble bubble-assistant';
  streamContentEl = document.createElement('div');
  streamContentEl.className = 'bubble-content';
  streamBubbleEl.appendChild(streamContentEl);
  container.appendChild(streamBubbleEl);
  scrollToBottom();
}

function appendToken(text) {
  if (!streamContentEl) return;
  streamAccumText += text;
  streamContentEl.innerHTML = formatAnswer(streamAccumText) + '<span class="stream-cursor">▍</span>';
  scrollToBottom();
}

function appendBubbleMetadata(div, data) {
  let html = '';

  if (data.rewritten && data.rewritten !== data.message) {
    html += `<div class="bubble-rewritten">
      <span class="rewritten-label">🔄 Dipahami sebagai:</span>
      <span class="rewritten-text">${escapeHtml(data.rewritten)}</span>
    </div>`;
  }

  if (data.sources && data.sources.length > 0) {
    html += `<div class="bubble-sources">
      <div class="sources-title">📄 Sumber Dokumen</div>
      ${data.sources.map(s => `
        <a href="/document/${s.doc_id}" class="source-item" target="_blank">
          <span class="source-name">${escapeHtml(s.judul)}</span>
          ${s.ru ? `<span class="source-badge">${s.ru}</span>` : ''}
          ${s.halaman ? `<span class="source-badge">Hal. ${s.halaman}</span>` : ''}
          <span class="source-score">${Math.round(s.score*100)}%</span>
        </a>
      `).join('')}
    </div>`;
  }

  if (data.sql) {
    html += `<details class="bubble-sql">
      <summary>🗄️ SQL Query ${data.total_rows ? `(${data.total_rows} hasil)` : ''}</summary>
      <pre class="sql-code">${escapeHtml(data.sql)}</pre>
    </details>`;
  }

  if (data.cypher) {
    html += `<details class="bubble-sql">
      <summary>🔗 Cypher Query</summary>
      <pre class="sql-code">${escapeHtml(data.cypher)}</pre>
    </details>`;
  }

  if (html) div.innerHTML += html;
}

// ─── Send message (SSE streaming) ───────────────────────────────────────────
async function sendMessage() {
  const input = document.getElementById('chat-input');
  const message = input.value.trim();
  if (!message || isLoading) return;

  isLoading = true;
  input.value = '';
  input.style.height = 'auto';
  document.getElementById('send-btn').disabled = true;

  appendBubble('user', message);

  const filters = {};

  const statusId = showStatusBubble('Memproses pertanyaan...');
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), 135000);

  try {
    const response = await fetch('/api/chat/stream', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message, history, filters, session_id: SESSION_ID}),
      signal: controller.signal
    });

    if (!response.ok) throw new Error('Server error ' + response.status);

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, {stream: true});
      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        let data;
        try { data = JSON.parse(line.slice(6)); } catch { continue; }

        if (data.type === 'status') {
          updateStatusBubble(statusId, data.label, data.step);
        } else if (data.type === 'token') {
          if (!streamContentEl) startStreamBubble(statusId);
          appendToken(data.text);
        } else if (data.type === 'result') {
          removeStatusBubble(statusId);
          if (streamBubbleEl) {
            // remove cursor, re-render final markdown
            streamContentEl.innerHTML = formatAnswer(streamAccumText);
            appendBubbleMetadata(streamBubbleEl, data);
            streamBubbleEl = null; streamContentEl = null; streamAccumText = '';
          } else {
            appendAssistantBubble(data);
          }
          history.push({role: 'user', content: message});
          history.push({role: 'assistant', content: data.answer || ''});
          if (history.length > 20) history = history.slice(-20);
          showIntent(data.intent);
        } else if (data.type === 'error') {
          removeStatusBubble(statusId);
          appendBubble('assistant', 'Error: ' + (data.message || 'Terjadi kesalahan.'));
        }
      }
    }
  } catch (err) {
    removeStatusBubble(statusId);
    const msg = err.name === 'AbortError'
      ? 'Permintaan timeout — server terlalu lama merespons. Coba lagi atau sederhanakan pertanyaan.'
      : 'Gagal terhubung ke server. Pastikan server berjalan dan coba refresh halaman.';
    appendBubble('assistant', msg);
  } finally {
    clearTimeout(timer);
    isLoading = false;
    document.getElementById('send-btn').disabled = false;
    input.focus();
  }
}

function appendBubble(role, content) {
  const container = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = `chat-bubble bubble-${role}`;
  div.innerHTML = `<div class="bubble-content">${escapeHtml(content).replace(/\n/g, '<br>')}</div>`;
  container.appendChild(div);
  scrollToBottom();
}

function appendAssistantBubble(data) {
  const container = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = 'chat-bubble bubble-assistant';

  let html = `<div class="bubble-content">${formatAnswer(data.answer)}</div>`;

  if (data.rewritten && data.rewritten !== data.message) {
    html += `<div class="bubble-rewritten">
      <span class="rewritten-label">🔄 Dipahami sebagai:</span>
      <span class="rewritten-text">${escapeHtml(data.rewritten)}</span>
    </div>`;
  }

  if (data.sources && data.sources.length > 0) {
    html += `<div class="bubble-sources">
      <div class="sources-title">📄 Sumber Dokumen</div>
      ${data.sources.map(s => `
        <a href="/document/${s.doc_id}" class="source-item" target="_blank">
          <span class="source-name">${escapeHtml(s.judul)}</span>
          ${s.ru ? `<span class="source-badge">${s.ru}</span>` : ''}
          ${s.halaman ? `<span class="source-badge">Hal. ${s.halaman}</span>` : ''}
          <span class="source-score">${Math.round(s.score*100)}%</span>
        </a>
      `).join('')}
    </div>`;
  }

  if (data.sql) {
    html += `<details class="bubble-sql">
      <summary>🗄️ SQL Query ${data.total_rows ? `(${data.total_rows} hasil)` : ''}</summary>
      <pre class="sql-code">${escapeHtml(data.sql)}</pre>
    </details>`;
  }

  if (data.cypher) {
    html += `<details class="bubble-sql">
      <summary>🔗 Cypher Query</summary>
      <pre class="sql-code">${escapeHtml(data.cypher)}</pre>
    </details>`;
  }

  div.innerHTML = html;
  container.appendChild(div);
  scrollToBottom();
}

function showIntent(intent) {
  const badge = document.getElementById('intent-indicator');
  const labels = {rag:'📄 RAG Dokumen', sql:'🗄️ Query Database', graph:'🔗 Knowledge Graph', hybrid:'⚡ Hybrid', general:'💬 General'};
  badge.textContent = labels[intent] || intent;
  badge.className = `intent-badge intent-${intent}`;
  setTimeout(() => badge.classList.add('hidden'), 5000);
}

function formatAnswer(text) {
  return escapeHtml(text)
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/^- (.+)$/gm, '• $1')
    .replace(/\n/g, '<br>');
}

function escapeHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function scrollToBottom() {
  const c = document.getElementById('chat-messages');
  c.scrollTop = c.scrollHeight;
}

document.getElementById('chat-input').focus();
</script>
{% endblock %}
