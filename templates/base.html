<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>{{ title }} — Pertamina DGS</title>
<link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-brand">
    <span class="brand-icon">⬡</span>
    <span class="brand-text">DGS Pertamina</span>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-group-label">Governance</div>
    <a href="/governance" class="nav-item {% if title == 'Data Governance' %}active{% endif %}">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Overview
    </a>
    <a href="/catalog" class="nav-item {% if title == 'Data Catalog' %}active{% endif %}">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Data Catalog
    </a>
    <a href="/equipment" class="nav-item {% if title == 'Equipment Master' %}active{% endif %}">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93A10 10 0 1 0 4.93 19.07 10 10 0 0 0 19.07 4.93z"/></svg>
      Equipment 360°
    </a>

    <a href="/chat" class="nav-item {% if title == 'AI Assistant' %}active{% endif %}">
      <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
      AI Assistant
    </a>
    <a href="/knowledge-graph" class="nav-item {% if title == 'Knowledge Graph' %}active{% endif %}">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="5" r="2"/><circle cx="5" cy="19" r="2"/><circle cx="19" cy="19" r="2"/><line x1="12" y1="7" x2="5" y2="17"/><line x1="12" y1="7" x2="19" y2="17"/></svg>
      Knowledge Graph
    </a>
    <a href="/tag-mapping" class="nav-item {% if title == 'Tag Mapping' %}active{% endif %}">
      <svg viewBox="0 0 24 24"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
      Tag Mapping
    </a>

    <div class="nav-group-label" style="margin-top:8px">Dokumen</div>
    <a href="/" class="nav-item {% if title == 'Dashboard' %}active{% endif %}">
      <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Dashboard
    </a>
    <a href="/upload" class="nav-item {% if title == 'Upload Dokumen' %}active{% endif %}">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Upload
    </a>
    <a href="/library" class="nav-item {% if title == 'Perpustakaan Dokumen' %}active{% endif %}">
      <svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
      Perpustakaan
    </a>
    <a href="/search" class="nav-item {% if title == 'Smart Search' %}active{% endif %}">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      Smart Search
    </a>
  </nav>
</aside>
<main class="main">
  <header class="topbar">
    <h1 class="page-title">{{ title }}</h1>
  </header>
  <div class="content">
    {% block content %}{% endblock %}
  </div>
</main>
<script src="/static/js/app.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
